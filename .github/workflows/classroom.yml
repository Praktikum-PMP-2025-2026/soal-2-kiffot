name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "()())()"
          expected-output: |-
            (())()
            ()()()
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - sudah valid
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - sudah valid
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "(a)"
          expected-output: "(a)"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - satu hasil kosong dari semua buka
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - satu hasil kosong dari semua buka
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "((("
          expected-output: ""
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - satu hasil kosong dari semua tutup
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - satu hasil kosong dari semua tutup
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: ")))"
          expected-output: ""
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - dua hasil berbeda
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - dua hasil berbeda
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "(a)())()"
          expected-output: |-
            (a())()
            (a)()()
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - hasil tunggal valid
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - hasil tunggal valid
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: ")("
          expected-output: ""
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - huruf tetap urut
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - huruf tetap urut
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "a)b(c)d)"
          expected-output: "ab(c)d"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - banyak hasil harus unik dan terurut
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - banyak hasil harus unik dan terurut
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "()())())"
          expected-output: |-
            ((()))
            (()())
            (())()
            ()(())
            ()()()
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - huruf tanpa kurung
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - huruf tanpa kurung
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "abc"
          expected-output: "abc"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - satu hasil valid dengan nested
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - satu hasil valid dengan nested
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "((a)"
          expected-output: "(a)"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
